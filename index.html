<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">LividShop | Gaming Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap');
        :root { --font-en: 'Inter', sans-serif; --font-ar: 'Tajawal', sans-serif; }
        .lang-ar { font-family: var(--font-ar); }
        .lang-en { font-family: var(--font-en); }
        .tab-btn.active { background-color: #4f46e5; color: white; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2); }
        .product-card { transition: all 0.2s ease; border-radius: 1.5rem; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); }
        /* تصميم زر "قريباً" */
        .coming-soon-tag { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 lang-en">

    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-1.5 rounded-lg text-white shadow-sm"><i class="fas fa-shield-halved text-lg"></i></div>
                <h1 class="text-xl font-black">Livid<span class="text-indigo-600">Shop</span></h1>
            </div>
            <button onclick="toggleLanguage()" class="bg-slate-900 text-white px-4 py-1.5 rounded-full font-bold text-[10px] flex items-center gap-2 hover:bg-indigo-600 transition shadow-sm uppercase">
                <i class="fas fa-language"></i> <span id="lang-btn-text">العربية</span>
            </button>
        </div>
    </header>

    <!-- قائمة الألعاب (القائمة الجديدة) -->
    <div class="bg-white border-b border-slate-100 overflow-x-auto whitespace-nowrap scrollbar-hide">
        <div class="container mx-auto px-4 flex gap-6 py-4">
            <button onclick="selectGame('efootball')" id="game-efootball" class="font-bold text-sm text-indigo-600 border-b-2 border-indigo-600 pb-1">Efootball</button>
            <button onclick="selectGame('bountyrush')" id="game-bountyrush" class="font-bold text-sm text-slate-400 hover:text-slate-600 pb-1">Bounty Rush</button>
            <button onclick="selectGame('tsubasa')" id="game-tsubasa" class="font-bold text-sm text-slate-400 hover:text-slate-600 pb-1">Captain Tsubasa</button>
            <button onclick="selectGame('yugioh')" id="game-yugioh" class="font-bold text-sm text-slate-400 hover:text-slate-600 pb-1">Yu-Gi-Oh!</button>
            <button onclick="selectGame('genshin')" id="game-genshin" class="font-bold text-sm text-slate-400 hover:text-slate-600 pb-1">Genshin Impact</button>
        </div>
    </div>

    <!-- أزرار Android / iOS (تظهر فقط في ايفوتبول حالياً) -->
    <div id="device-selector" class="container mx-auto px-4 mt-6">
        <div class="bg-slate-200/50 p-1 rounded-2xl flex gap-1 max-w-[240px] mx-auto">
            <button onclick="switchCategory('android')" id="tab-android" class="tab-btn active flex-1 py-2 rounded-xl font-bold text-[10px] transition-all">Android</button>
            <button onclick="switchCategory('ios')" id="tab-ios" class="tab-btn flex-1 py-2 rounded-xl font-bold text-[10px] text-slate-500 transition-all">iOS</button>
        </div>
    </div>

    <main class="container mx-auto px-4 py-10">
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- المنتجات -->
        </div>
    </main>

    <script>
        let productsData = {};
        let currentLang = 'en';
        let currentGame = 'efootball';
        let currentCategory = 'android'; // Android or iOS

        const gameImages = {
            bountyrush: "https://i.ibb.co/B5vdd88v/bounty.jpg",
            tsubasa: "https://i.ibb.co/ch6RmSBM/tsubasa.jpg",
            yugioh: "https://i.ibb.co/Fb4kKjgv/yugioh.jpg",
            genshin: "https://i.ibb.co/wN78WcTZ/genshin.jpg"
        };

        const translations = {
            en: { soon: "Available Soon", buy_wa: "WhatsApp", buy_gm: "Gmail", lang_btn: "العربية" },
            ar: { soon: "يتوفر قريباً", buy_wa: "واتساب", buy_gm: "جيميل", lang_btn: "English" }
        };

        async function init() {
            const res = await fetch('products.json');
            productsData = await res.json();
            render();
        }

        function selectGame(game) {
            currentGame = game;
            document.querySelectorAll('button[id^="game-"]').forEach(b => {
                b.classList.remove('text-indigo-600', 'border-indigo-600', 'border-b-2');
                b.classList.add('text-slate-400');
            });
            document.getElementById(`game-${game}`).classList.add('text-indigo-600', 'border-indigo-600', 'border-b-2');
            document.getElementById(`game-${game}`).classList.remove('text-slate-400');
            
            // إخفاء أو إظهار اختيار الجهاز (Android/iOS) فقط في ايفوتبول
            document.getElementById('device-selector').style.display = (game === 'efootball') ? 'block' : 'none';
            render();
        }

        function switchCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${cat}`).classList.add('active');
            render();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.getElementById('main-html').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-btn-text').innerText = translations[currentLang].lang_btn;
            render();
        }

        function render() {
            const grid = document.getElementById('products-grid');
            const t = translations[currentLang];

            if (currentGame !== 'efootball') {
                // عرض واجهة "قريباً" للألعاب الأخرى
                grid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center py-10">
                        <img src="${gameImages[currentGame]}" class="w-64 h-40 object-cover rounded-3xl shadow-lg mb-6 grayscale">
                        <div class="coming-soon-tag">${t.soon}</div>
                    </div>
                `;
                return;
            }

            // عرض منتجات Efootball (Android أو iOS)
            const products = productsData[currentCategory] || [];
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white border border-slate-100 flex flex-col h-full shadow-sm">
                    <img src="${p.image}" class="w-full aspect-video object-cover">
                    <div class="p-4 flex-grow flex flex-col">
                        <h4 class="font-bold text-sm mb-1">${p.title}</h4>
                        <div class="text-indigo-600 font-black text-lg mb-4">${p.info} = $${p.price}</div>
                        <div class="grid grid-cols-2 gap-2 mt-auto">
                            <button class="bg-green-500 text-white py-2 rounded-xl text-[10px] font-bold"><i class="fab fa-whatsapp"></i> ${t.buy_wa}</button>
                            <button class="bg-slate-50 text-slate-600 py-2 rounded-xl text-[10px] font-bold border border-slate-100"><i class="far fa-envelope"></i> ${t.buy_gm}</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
