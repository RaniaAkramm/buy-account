<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">LividShop | Gaming Accounts</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap');
        :root { --font-en: 'Inter', sans-serif; --font-ar: 'Tajawal', sans-serif; }
        .lang-ar { font-family: var(--font-ar); }
        .lang-en { font-family: var(--font-en); }
        .tab-btn.active { background-color: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .product-card { transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 lang-en">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-100">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-md">
                    <i class="fas fa-shield-halved text-xl"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tight">Livid<span class="text-indigo-600">Shop</span></h1>
            </div>
            
            <button onclick="toggleLanguage()" class="bg-slate-900 text-white px-5 py-2 rounded-full font-bold text-xs flex items-center gap-2 hover:bg-indigo-600 transition">
                <i class="fas fa-language"></i>
                <span id="lang-btn-text">العربية</span>
            </button>
        </div>
    </header>

    <!-- Hero -->
    <section class="bg-slate-950 text-white py-12 text-center relative overflow-hidden">
        <div class="container mx-auto px-4 relative z-10">
            <h2 id="hero-title" class="text-3xl md:text-5xl font-black mb-4">Premium Accounts</h2>
            <p id="hero-desc" class="text-slate-400 text-sm md:text-base italic">Instant Delivery • Safe • Best Prices</p>
        </div>
    </section>

    <!-- Tabs -->
    <div class="container mx-auto px-4 -mt-6 relative z-20">
        <div class="bg-white p-1.5 rounded-2xl shadow-lg border border-slate-100 flex gap-2 max-w-xs mx-auto">
            <button onclick="switchCategory('android')" id="tab-android" class="tab-btn active flex-1 py-2.5 rounded-xl font-bold text-sm transition-all">Android</button>
            <button onclick="switchCategory('ios')" id="tab-ios" class="tab-btn flex-1 py-2.5 rounded-xl font-bold text-sm text-slate-400 transition-all">iOS</button>
        </div>
    </div>

    <!-- Grid -->
    <main class="container mx-auto px-4 py-12">
        <div id="loading" class="text-center py-20 text-slate-300">
            <i class="fas fa-spinner fa-spin text-3xl"></i>
        </div>
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 hidden">
            <!-- JS Injection -->
        </div>
    </main>

    <footer class="bg-white border-t py-10 text-center">
        <p class="text-slate-400 text-xs">© 2024 LividShop | Gaming Marketplace</p>
    </footer>

    <script>
        let productsData = {};
        let currentLang = 'en';
        let currentCategory = 'android';

        const config = {
            whatsapp: "+9647805380508",
            email: "GoLividShop@gmail.com"
        };

        const translations = {
            en: {
                lang_btn: "العربية",
                hero_title: "Efootball 2026 Accounts",
                hero_desc: "Select your device and start playing now.",
                buy_wa: "WhatsApp",
                buy_email: "Gmail",
                android_tag: "Android",
                ios_tag: "iOS"
            },
            ar: {
                lang_btn: "English",
                hero_title: "حسابات ايفوتبول 2026",
                hero_desc: "اختر نوع جهازك وابدأ اللعب الآن.",
                buy_wa: "واتساب",
                buy_email: "جيميل",
                android_tag: "أندرويد",
                ios_tag: "آيفون"
            }
        };

        async function init() {
            try {
                const res = await fetch('products.json');
                productsData = await res.json();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('products-grid').classList.remove('hidden');
                updateUI();
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = "Failed to load products. Check products.json";
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            updateUI();
        }

        function switchCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.add('text-slate-400');
            });
            document.getElementById(`tab-${cat}`).classList.add('active');
            document.getElementById(`tab-${cat}`).classList.remove('text-slate-400');
            render();
        }

        function updateUI() {
            const isAr = currentLang === 'ar';
            const t = translations[currentLang];
            document.getElementById('main-html').dir = isAr ? 'rtl' : 'ltr';
            document.body.className = `bg-slate-50 text-slate-900 lang-${currentLang}`;
            document.getElementById('lang-btn-text').innerText = t.lang_btn;
            document.getElementById('hero-title').innerText = t.hero_title;
            document.getElementById('hero-desc').innerText = t.hero_desc;
            render();
        }

        function render() {
            const grid = document.getElementById('products-grid');
            const t = translations[currentLang];
            const products = productsData[currentCategory] || [];
            
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm flex flex-col">
                    <div class="relative aspect-video bg-slate-100">
                        <img src="${p.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x225?text=Efootball'">
                        <span class="absolute top-2 left-2 bg-black/60 text-white text-[9px] font-bold px-2 py-0.5 rounded backdrop-blur-sm">
                            ${currentCategory === 'android' ? t.android_tag : t.ios_tag}
                        </span>
                    </div>
                    <div class="p-4 flex-grow flex flex-col">
                        <h4 class="font-bold text-slate-800 text-sm mb-1">${p.title}</h4>
                        <div class="text-indigo-600 font-black text-lg mb-4">${p.info} = $${p.price}</div>
                        
                        <div class="grid grid-cols-2 gap-2 mt-auto">
                            <button onclick="orderWA('${p.title}', '${p.info}', '${p.price}')" 
                                class="bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg text-[11px] font-bold transition flex items-center justify-center gap-1">
                                <i class="fab fa-whatsapp"></i> ${t.buy_wa}
                            </button>
                            <button onclick="orderEmail('${p.title}', '${p.info}', '${p.price}')" 
                                class="bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-lg text-[11px] font-bold transition flex items-center justify-center gap-1">
                                <i class="far fa-envelope"></i> ${t.buy_email}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function orderWA(title, info, price) {
            const msg = encodeURIComponent(`Hello LividShop!\nI want to buy:\n${title}\nDetails: ${info}\nDevice: ${currentCategory}\nPrice: $${price}`);
            window.open(`https://wa.me/${config.whatsapp.replace('+', '')}?text=${msg}`, '_blank');
        }

        function orderEmail(title, info, price) {
            const sub = encodeURIComponent(`Order: ${title}`);
            const body = encodeURIComponent(`Product: ${title}\nInfo: ${info}\nDevice: ${currentCategory}\nPrice: $${price}`);
            window.location.href = `mailto:${config.email}?subject=${sub}&body=${body}`;
        }

        window.onload = init;
    </script>
</body>
</html>
