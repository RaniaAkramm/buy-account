<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title id="site-title">GoLivid Shop | Buy Efootball Accounts</title>
    <meta name="description" id="meta-desc" content="Buy premium Efootball 2026 accounts for Android. Safe and fast delivery.">
    <meta name="keywords" id="meta-keys" content="buy efootball account, efootball 2026 accounts, android gaming accounts, account bounty rush">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap');
        
        :root { --font-en: 'Inter', sans-serif; --font-ar: 'Tajawal', sans-serif; }
        .lang-ar { font-family: var(--font-ar); }
        .lang-en { font-family: var(--font-en); }
        
        .account-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .account-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        
        .contact-btn {
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }
        .contact-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 lang-en">

    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-slate-100">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-200">
                    <i class="fas fa-user-shield text-xl"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tighter">GoLivid<span class="text-indigo-600">Shop</span></h1>
            </div>
            
            <button onclick="toggleLanguage()" class="bg-slate-900 text-white px-6 py-2 rounded-full font-bold text-sm hover:bg-indigo-600 transition-all">
                <i class="fas fa-language mr-2 rtl:ml-2"></i>
                <span id="lang-btn-text">العربية</span>
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="bg-slate-950 text-white py-20 relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        <div class="container mx-auto px-4 text-center relative z-10">
            <h2 id="hero-title" class="text-4xl md:text-6xl font-black mb-6 leading-tight">Efootball 2026 Accounts</h2>
            <p id="hero-desc" class="text-slate-400 text-lg md:text-xl max-w-3xl mx-auto mb-10 italic">Premium Android accounts with verified coin balances. Choose your squad now.</p>
            <a href="#accounts" id="hero-btn" class="bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-indigo-500 transition shadow-xl inline-block">View Accounts</a>
        </div>
    </section>

    <!-- Accounts Grid -->
    <main class="container mx-auto px-4 py-16" id="accounts">
        <div class="flex items-center gap-4 mb-12">
            <div class="h-10 w-2 bg-indigo-600 rounded-full"></div>
            <h3 id="section-title" class="text-3xl font-bold">Available Accounts</h3>
        </div>

        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Rendered by JS -->
        </div>
    </main>

    <!-- Footer - Icons Only Communication -->
    <footer class="bg-white border-t border-slate-100 py-16">
        <div class="container mx-auto px-4 text-center">
            <h4 id="footer-title" class="text-2xl font-bold text-slate-800 mb-8 tracking-tight">Order Your Account</h4>
            <div class="flex justify-center gap-8">
                <!-- WhatsApp -->
                <a href="https://wa.me/9647805380508" target="_blank" class="contact-btn bg-green-500 text-white hover:bg-green-600 shadow-lg shadow-green-100">
                    <i class="fab fa-whatsapp text-2xl"></i>
                </a>
                <!-- Gmail -->
                <a href="mailto:GoLividShop@gmail.com" class="contact-btn bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-100">
                    <i class="far fa-envelope text-2xl"></i>
                </a>
            </div>
            <p class="text-slate-400 text-sm mt-12">© 2024 GoLivid Store. Trusted Gaming Marketplace.</p>
        </div>
    </footer>

    <script>
        const translations = {
            en: {
                site_title: "GoLivid Shop | Buy Efootball Accounts",
                hero_title: "Efootball 2026 Accounts",
                hero_desc: "Premium Android accounts with verified coin balances. Choose your squad now.",
                hero_btn: "View Accounts",
                section_title: "Available Accounts",
                footer_title: "Order Your Account",
                lang_btn: "العربية",
                buy_wa: "Buy via WhatsApp",
                buy_gmail: "Buy via Gmail",
                currency: "$",
                acc_label: "Account Efootball"
            },
            ar: {
                site_title: "متجر جو ليفيد | شراء حسابات ايفوتبول",
                hero_title: "حسابات ايفوتبول 2026",
                hero_desc: "حسابات أندرويد مميزة تحتوي على رصيد كوينز مضمون. اختر تشكيلتك الآن.",
                hero_btn: "تصفح الحسابات",
                section_title: "الحسابات المتوفرة",
                footer_title: "اطلب حسابك الآن",
                lang_btn: "English",
                buy_wa: "شراء عبر واتساب",
                buy_gmail: "شراء عبر الإيميل",
                currency: "$",
                acc_label: "حساب ايفوتبول"
            }
        };

        const accounts = [
            { id: 1, coins: "2100", price: "4" },
            { id: 2, coins: "3100", price: "4.6" },
            { id: 3, coins: "4100", price: "6" },
            { id: 4, coins: "5100", price: "7.8" },
            { id: 5, coins: "6000", price: "9.5" },
            { id: 6, coins: "7000", price: "12" },
            { id: 7, coins: "8000", price: "15.5" },
            { id: 8, coins: "9000", price: "18" },
            { id: 9, coins: "10000", price: "21" },
            { id: 10, coins: "11000", price: "24" },
            { id: 11, coins: "12000", price: "28" },
            { id: 12, coins: "13000", price: "31" }
        ];

        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            updateUI();
        }

        function updateUI() {
            const isAr = currentLang === 'ar';
            const t = translations[currentLang];
            
            document.getElementById('main-html').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('main-html').lang = currentLang;
            document.body.className = `bg-slate-50 text-slate-900 lang-${currentLang}`;
            
            document.title = t.site_title;
            document.getElementById('lang-btn-text').innerText = t.lang_btn;
            document.getElementById('hero-title').innerText = t.hero_title;
            document.getElementById('hero-desc').innerText = t.hero_desc;
            document.getElementById('hero-btn').innerText = t.hero_btn;
            document.getElementById('section-title').innerText = t.section_title;
            document.getElementById('footer-title').innerText = t.footer_title;

            renderAccounts();
        }

        function renderAccounts() {
            const grid = document.getElementById('products-grid');
            const t = translations[currentLang];
            
            grid.innerHTML = accounts.map(acc => {
                const title = `${t.acc_label} ${acc.coins} 🪙`;
                return `
                    <div class="account-card bg-white rounded-3xl border border-slate-100 overflow-hidden flex flex-col h-full shadow-sm">
                        <div class="relative aspect-[16/10] bg-slate-200">
                            <!-- Ensure 1000227623.jpg is in the same folder -->
                            <img src="1000227623.jpg" alt="${title}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x250?text=Efootball+Account'">
                            <div class="absolute top-4 left-4 bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded shadow-md uppercase tracking-wider">Android Only</div>
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <h4 class="text-xl font-bold mb-4 text-slate-800">${title}</h4>
                            <div class="mt-auto">
                                <div class="text-indigo-600 font-black text-3xl mb-6">
                                    <span class="text-lg font-bold">${t.currency}</span>${acc.price}
                                </div>
                                <div class="flex flex-col gap-2">
                                    <button onclick="orderWA('${title}', '${acc.price}')" 
                                        class="w-full bg-green-500 hover:bg-green-600 text-white py-3.5 rounded-2xl font-bold transition flex items-center justify-center gap-2">
                                        <i class="fab fa-whatsapp text-lg"></i> ${t.buy_wa}
                                    </button>
                                    <button onclick="orderEmail('${title}', '${acc.price}')"
                                        class="w-full bg-slate-100 hover:bg-indigo-600 hover:text-white text-slate-600 py-3.5 rounded-2xl font-bold transition flex items-center justify-center gap-2">
                                        <i class="far fa-envelope text-lg"></i> ${t.buy_gmail}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function orderWA(name, price) {
            const text = encodeURIComponent(`Order from GoLivid Shop:\nAccount: ${name}\nPrice: $${price}`);
            window.open(`https://wa.me/9647805380508?text=${text}`, '_blank');
        }

        function orderEmail(name, price) {
            const subject = encodeURIComponent(`Purchase Request: ${name}`);
            const body = encodeURIComponent(`Hello GoLivid Shop,\n\nI want to buy this account:\n${name}\nPrice: $${price}\n\nPlease send me payment instructions.`);
            window.location.href = `mailto:GoLividShop@gmail.com?subject=${subject}&body=${body}`;
        }

        document.addEventListener('DOMContentLoaded', updateUI);
    </script>
</body>
</html>
