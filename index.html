<!DOCTYPE html>
<html lang="en" dir="ltr" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoLivid Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Tajawal:wght@400;700&display=swap');
        
        :root {
            --font-en: 'Inter', sans-serif;
            --font-ar: 'Tajawal', sans-serif;
        }

        body { transition: background-color 0.3s ease; }
        .lang-ar { font-family: var(--font-ar); }
        .lang-en { font-family: var(--font-en); }

        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 lang-en">

    <!-- Navbar -->
    <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl text-white">
                    <i class="fas fa-shopping-cart text-xl"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-800">GoLivid<span class="text-indigo-600">Shop</span></h1>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-4">
                <button onclick="toggleLanguage()" class="flex items-center gap-2 px-3 py-2 border border-slate-200 rounded-full hover:bg-slate-50 transition font-bold text-sm">
                    <i class="fas fa-globe text-indigo-600"></i>
                    <span id="lang-btn-text">العربية</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="bg-slate-900 text-white py-16 md:py-24">
        <div class="container mx-auto px-4 text-center">
            <h2 id="hero-title" class="text-3xl md:text-6xl font-bold mb-6">Premium Global Products</h2>
            <p id="hero-desc" class="text-slate-400 text-lg max-w-2xl mx-auto mb-10">High-quality items delivered across Iraq with the best customer support.</p>
            <a href="#store" id="hero-btn" class="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg inline-block">Start Shopping</a>
        </div>
    </section>

    <!-- Main Store -->
    <main class="container mx-auto px-4 py-16" id="store">
        <div class="flex items-center gap-4 mb-12">
            <div class="h-10 w-2 bg-indigo-600 rounded-full"></div>
            <h3 id="section-title" class="text-3xl font-bold">New Arrivals</h3>
        </div>

        <!-- Products Grid -->
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Loading Skeleton -->
            <div class="animate-pulse bg-white p-6 rounded-2xl border border-slate-100 h-80"></div>
            <div class="animate-pulse bg-white p-6 rounded-2xl border border-slate-100 h-80"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-100 py-12 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-slate-500 mb-4">GoLividShop@gmail.com | +964 780 538 0508</p>
            <p class="text-sm text-slate-400">© 2024 GoLivid Shop. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Configuration
        const WHATSAPP = "9647805380508";
        const EMAIL = "GoLividShop@gmail.com";
        const JSON_URL = "products.json"; // ملف المكتبة الخارجي

        let currentLang = 'en';
        let products = [];

        const i18n = {
            en: {
                lang_btn: "العربية",
                hero_title: "Premium Global Products",
                hero_desc: "High-quality items delivered across Iraq with the best customer support.",
                hero_btn: "Start Shopping",
                section_title: "New Arrivals",
                buy_wa: "Order via WhatsApp",
                buy_email: "Order via Email",
                currency: "IQD"
            },
            ar: {
                lang_btn: "English",
                hero_title: "منتجات عالمية فاخرة",
                hero_desc: "بضائع عالية الجودة تصلك إلى أي مكان في العراق مع أفضل دعم فني.",
                hero_btn: "ابدأ التسوق",
                section_title: "وصل حديثاً",
                buy_wa: "اطلب عبر واتساب",
                buy_email: "اطلب عبر الإيميل",
                currency: "دينار"
            }
        };

        // 1. Fetch products from external JSON or use backup
        async function loadProducts() {
            try {
                const response = await fetch(JSON_URL);
                if (!response.ok) throw new Error('File not found');
                products = await response.json();
            } catch (error) {
                console.warn("JSON file not found, using backup data.");
                // منتجات احتياطية في حال لم يجد ملف JSON
                products = [
                    {
                        "id": 1,
                        "name_en": "Smart Watch Ultra",
                        "name_ar": "ساعة الترا الذكية",
                        "price": "450,000",
                        "image": "https://images.unsplash.com/photo-1434493907317-a46b53b81822?w=500",
                        "desc_en": "Best rugged watch.",
                        "desc_ar": "أفضل ساعة للمهام الصعبة."
                    }
                ];
            }
            render();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            updateLayout();
            render();
        }

        function updateLayout() {
            const isAr = currentLang === 'ar';
            document.getElementById('main-html').dir = isAr ? 'rtl' : 'ltr';
            document.getElementById('main-html').lang = isAr ? 'ar' : 'en';
            document.body.className = `bg-gray-50 text-slate-900 lang-${currentLang}`;
            
            // Update static text
            document.getElementById('lang-btn-text').innerText = i18n[currentLang].lang_btn;
            document.getElementById('hero-title').innerText = i18n[currentLang].hero_title;
            document.getElementById('hero-desc').innerText = i18n[currentLang].hero_desc;
            document.getElementById('hero-btn').innerText = i18n[currentLang].hero_btn;
            document.getElementById('section-title').innerText = i18n[currentLang].section_title;
        }

        function render() {
            const grid = document.getElementById('products-grid');
            const lang = currentLang;
            const t = i18n[lang];

            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-2xl border border-slate-100 overflow-hidden flex flex-col h-full">
                    <img src="${p.image}" alt="${p['name_'+lang]}" class="w-full h-64 object-cover">
                    <div class="p-6 flex flex-col flex-grow">
                        <h4 class="text-xl font-bold mb-2">${p['name_'+lang]}</h4>
                        <p class="text-slate-500 text-sm mb-4 line-clamp-2">${p['desc_'+lang]}</p>
                        <div class="mt-auto">
                            <div class="text-indigo-600 font-bold text-2xl mb-6">${p.price} <span class="text-xs uppercase">${t.currency}</span></div>
                            <div class="flex flex-col gap-2">
                                <button onclick="orderWA('${p['name_'+lang]}', '${p.price}')" class="bg-green-500 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-green-600 transition">
                                    <i class="fab fa-whatsapp"></i> ${t.buy_wa}
                                </button>
                                <button onclick="orderEmail('${p['name_'+lang]}', '${p.price}')" class="bg-slate-100 text-slate-700 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-600 hover:text-white transition">
                                    <i class="far fa-envelope"></i> ${t.buy_email}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.orderWA = (name, price) => {
            const msg = `Hello GoLivid! I want to order:\nProduct: ${name}\nPrice: ${price}`;
            window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.orderEmail = (name, price) => {
            const subject = `Order: ${name}`;
            const body = `I want to order ${name} for ${price}`;
            window.location.href = `mailto:${EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        };

        // Initialize
        loadProducts();
        updateLayout();
    </script>
</body>
</html>
